<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <style>
        body{
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .botoes{
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: rgba(0, 0, 0, 0.2);
            gap: 10px;
        }

        button{
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            background-color: #333;
            border-radius: 10px;
        }
        button:hover{
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="botoes">
        <button onclick="cadastrar()">Cadastrar</button>
        <button onclick="listar()">Listar</button>
        <button onclick="buscar()">Buscar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
